name: Build Godot Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export_game:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [Windows Desktop, Linux, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export game
        uses: firebelley/godot-export@v5
        with:
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.6.1/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.6.1/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: .
          archive_output: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-${{ matrix.platform }}
          path: ${{ github.workspace }}/dist/*.zip