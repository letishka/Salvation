name: Build Godot Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export_windows:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot -v --export-release "Windows Desktop" build/windows/game.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-windows
          path: build/windows/*

  export_linux:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export Linux
        run: |
          mkdir -p build/linux
          godot -v --export-release "Linux" build/linux/game.x86_64

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-linux
          path: build/linux/*

  export_macos:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot -v --export-release "macOS" build/macos/game.zip

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-macos
          path: build/macos/*