name: Build Godot Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export_game:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ["Windows Desktop", "Linux", "macOS"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export game
        uses: ceiga/godot-export-action@v1
        with:
          version: 4.6.1
          preset: ${{ matrix.platform }}
          output_name: game-${{ matrix.platform }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-${{ matrix.platform }}
          path: "*.zip"